name: Android Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native Android project
        run: npx expo prebuild --platform android

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/offergo-release.keystore

      - name: Configure signing
        run: |
          cat >> android/gradle.properties << EOF

          # Release signing config
          MYAPP_UPLOAD_STORE_FILE=offergo-release.keystore
          MYAPP_UPLOAD_KEY_ALIAS=offergo
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          EOF

      - name: Patch build.gradle for signing
        run: |
          python3 << 'PYEOF'
          import re

          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          pattern = r'(signingConfigs\s*\{\s*debug\s*\{[^}]*\}\s*)'
          replacement = r'''\1
          release {
              if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                  storeFile file(MYAPP_UPLOAD_STORE_FILE)
                  storePassword MYAPP_UPLOAD_STORE_PASSWORD
                  keyAlias MYAPP_UPLOAD_KEY_ALIAS
                  keyPassword MYAPP_UPLOAD_KEY_PASSWORD
              }
          }'''
          content = re.sub(pattern, replacement, content)
          content = content.replace('signingConfig signingConfigs.debug', 'signingConfig signingConfigs.release')

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)
          PYEOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: cd android && ./gradlew app:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk